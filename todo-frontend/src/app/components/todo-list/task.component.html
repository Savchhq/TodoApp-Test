<div class="container my-4">

  <div class="mb-5">
    <h1 class="display-4 mb-4">📝 Мої завдання</h1>
  </div>

  <!-- ================= Фільтри ================= -->

  <div class="card mb-4">

    <div class="card-header bg-light">
      <h5 class="mb-0">🔍 Пошук</h5>
    </div>

    <div class="card-body">

      <div class="row g-3">

        <div class="col-md-6">
          <input
            type="text"
            class="form-control"
            placeholder="Пошук за назвою..."
            [(ngModel)]="searchQuery"
            (keyup.enter)="applyFilters()">
        </div>

        <div class="col-md-6">
          <select class="form-select" [(ngModel)]="filterCategoryId">
            <option value="">Усі категорії</option>

            <option
              *ngFor="let category of categories"
              [value]="category.id">
              {{ category.name }}
            </option>
          </select>
        </div>

        <div class="col-12">
          <button
            type="button"
            class="btn btn-primary me-2"
            (click)="applyFilters()">
            🔎 Знайти
          </button>

          <button
            type="button"
            class="btn btn-secondary"
            (click)="clearFilters()">
            ♻️ Скинути
          </button>
        </div>

      </div>

    </div>

  </div>

  <!-- ================= Створення ================= -->

  <div class="card mb-4">

    <div class="card-header bg-light">
      <h5 class="mb-0">➕ Нове завдання</h5>
    </div>

    <div class="card-body">

      <div class="mb-3">
        <input
          type="text"
          class="form-control"
          placeholder="Назва завдання"
          [(ngModel)]="newTaskTitle"
          (keyup.enter)="addTask()">
      </div>

      <div class="mb-3">
        <textarea
          class="form-control"
          rows="3"
          placeholder="Опис (необов'язково)"
          [(ngModel)]="newTaskDescription">
        </textarea>
      </div>

      <div class="row g-2">

        <div class="col-md-6">
          <select class="form-select" [(ngModel)]="selectedCategoryId">

            <option
              value=""
              disabled
              *ngIf="categories.length === 0">
              Немає категорій
            </option>

            <option
              *ngFor="let category of categories"
              [value]="category.id">
              {{ category.name }}
            </option>

          </select>
        </div>

        <div class="col-md-6 d-flex gap-2">

          <a
            routerLink="/categories"
            class="btn btn-outline-secondary flex-grow-1">
            📂 Категорії
          </a>

          <button
            class="btn btn-success flex-grow-1"
            type="button"
            (click)="addTask()"
            [disabled]="!selectedCategoryId">
            ➕ Додати
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- ================= Результати ================= -->

  <div
    class="alert alert-info mb-4"
    *ngIf="totalCount > 0"
    role="alert">
    Знайдено <strong>{{ totalCount }}</strong> завдань
  </div>

  <!-- ================= Завдання ================= -->

  <div
    class="mb-4"
    *ngIf="tasks.length > 0">

    <div
      class="card task-item mb-3"
      *ngFor="let task of tasks">

      <ng-container
        *ngIf="editingTaskId !== task.id; else editForm">

        <div class="card-body">

          <div class="d-flex gap-3">

            <div class="form-check">
              <input
                class="form-check-input"
                type="checkbox"
                [checked]="task.isCompleted"
                (change)="toggleTask(task)"
                [id]="'checkbox-' + task.id">
              <label class="form-check-label" [for]="'checkbox-' + task.id"></label>
            </div>

            <div class="flex-grow-1">

              <div class="d-flex gap-2 align-items-center mb-2">

                <h5
                  class="mb-0"
                  [class.text-decoration-line-through]="task.isCompleted"
                  [class.text-muted]="task.isCompleted">
                  {{ task.title }}
                </h5>

                <span
                  class="badge bg-info"
                  *ngIf="task.categoryName">
                  📂 {{ task.categoryName }}
                </span>

              </div>

              <p
                *ngIf="task.description"
                class="mb-0 text-muted">
                {{ task.description }}
              </p>

            </div>

            <div class="d-flex gap-2">

              <button
                class="btn btn-sm btn-outline-primary"
                type="button"
                (click)="startEditTask(task)"
                title="Редагувати">
                ✏️
              </button>

              <button
                class="btn btn-sm btn-outline-danger"
                type="button"
                (click)="deleteTask(task.id)"
                title="Видалити">
                🗑️
              </button>

            </div>

          </div>

        </div>

      </ng-container>

      <!-- ================= Редагування ================= -->

      <ng-template #editForm>

        <div class="card-body">

          <div class="mb-3">
            <label class="form-label">Назва</label>
            <input
              type="text"
              class="form-control"
              [(ngModel)]="editTitle">
          </div>

          <div class="mb-3">
            <label class="form-label">Опис</label>
            <textarea
              class="form-control"
              rows="3"
              placeholder="Опис"
              [(ngModel)]="editDescription">
            </textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Категорія</label>
            <select class="form-select" [(ngModel)]="editCategoryId">

              <option
                *ngFor="let category of categories"
                [value]="category.id">
                {{ category.name }}
              </option>

            </select>
          </div>

          <div class="form-check mb-3">
            <input
              class="form-check-input"
              type="checkbox"
              [(ngModel)]="editIsCompleted"
              id="editCompleted">
            <label class="form-check-label" for="editCompleted">
              Виконано
            </label>
          </div>

          <div class="d-flex gap-2">

            <button
              class="btn btn-success"
              type="button"
              (click)="saveEditTask(task)">
              💾 Зберегти
            </button>

            <button
              class="btn btn-secondary"
              type="button"
              (click)="cancelEditTask()">
              ❌ Скасувати
            </button>

          </div>

        </div>

      </ng-template>

    </div>

  </div>

  <!-- ================= Пагінація ================= -->

  <nav
    *ngIf="totalPages > 1"
    aria-label="Page navigation">

    <ul class="pagination justify-content-center mb-4">

      <li class="page-item" [class.disabled]="pageNumber === 1">
        <button
          class="page-link"
          type="button"
          (click)="goToPage(pageNumber - 1)"
          [disabled]="pageNumber === 1">
          ← Назад
        </button>
      </li>

      <li class="page-item active">
        <span class="page-link">
          Сторінка {{ pageNumber }} з {{ totalPages }}
        </span>
      </li>

      <li class="page-item" [class.disabled]="pageNumber === totalPages">
        <button
          class="page-link"
          type="button"
          (click)="goToPage(pageNumber + 1)"
          [disabled]="pageNumber === totalPages">
          Далі →
        </button>
      </li>

    </ul>

  </nav>

  <!-- ================= Порожній список ================= -->

  <div
    class="text-center py-5"
    *ngIf="tasks.length === 0">

    <div class="fs-1 mb-3">
      📋
    </div>

    <h3>Завдань не знайдено</h3>

    <p class="text-muted">
      Спробуйте змінити фільтри або створіть нове завдання.
    </p>

  </div>

</div>
