<div class="container my-4">

  <div class="mb-5">
    <h2 class="display-5">📂 Управління категоріями</h2>
  </div>

  <!-- ================= Додавання ================= -->

  <div class="card mb-4">

    <div class="card-header bg-light">
      <h5 class="mb-0">➕ Нова категорія</h5>
    </div>

    <div class="card-body">

      <div class="input-group">
        <input
          type="text"
          class="form-control"
          placeholder="Назва нової категорії"
          [(ngModel)]="newCategoryName"
          (keyup.enter)="addCategory()">
        <button 
          class="btn btn-primary" 
          type="button" 
          (click)="addCategory()">
          ➕ Створити
        </button>
      </div>

    </div>

  </div>

  <!-- ================= Список категорій ================= -->

  <div class="list-group">

    <div 
      class="list-group-item"
      *ngFor="let category of categories">

      <ng-container *ngIf="editingCategoryId !== category.id; else editCategoryForm">

        <div class="d-flex justify-content-between align-items-center">

          <div>
            <h5 class="mb-0">{{ category.name }}</h5>
          </div>

          <div class="btn-group" role="group">

            <button 
              class="btn btn-sm btn-outline-primary"
              type="button"
              (click)="startEditCategory(category)"
              title="Редагувати">
              ✏️ Редагувати
            </button>

            <button 
              class="btn btn-sm btn-outline-danger"
              type="button"
              (click)="deleteCategory(category.id)"
              title="Видалити">
              🗑️ Видалити
            </button>

          </div>

        </div>

      </ng-container>

      <ng-template #editCategoryForm>

        <div class="d-flex gap-2">

          <input
            type="text"
            class="form-control"
            [(ngModel)]="editingCategoryName"
            (keyup.enter)="saveEditCategory(category)">

          <button 
            class="btn btn-success"
            type="button"
            (click)="saveEditCategory(category)">
            💾 Зберегти
          </button>

          <button 
            class="btn btn-secondary"
            type="button"
            (click)="cancelEditCategory()">
            ❌ Скасувати
          </button>

        </div>

      </ng-template>

    </div>

  </div>

  <!-- ================= Порожний список ================= -->

  <div
    class="text-center py-5"
    *ngIf="categories.length === 0">

    <div class="fs-1 mb-3">
      📂
    </div>

    <h4>Категорій не знайдено</h4>

    <p class="text-muted">
      Створіть першу категорію, щоб почати організовувати завдання.
    </p>

  </div>

</div>
